<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modulux Power Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(rgba(5,7,13,.92),rgba(5,7,13,.92)),url("hero-bg-2.png");
background-size:cover;
background-position:center;
}

.login-box{
width:380px;
background:rgba(17,24,39,.95);
padding:35px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,.5);
}

h1{
text-align:center;
color:#FFC107;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
background:#FFC107;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ffb300;
}

p{
text-align:center;
margin-top:20px;
color:#fff;
}

a{
color:#FFC107;
text-decoration:none;
}
</style>

</head>

<body>

<div class="login-box">

<h1>Member Login</h1>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button id="loginBtn">Login</button>

<p>
Don't have an account?
<a href="#" id="signupBtn">Create Account</a>
</p>

</div>

<script type="module" src="auth.js"></script>

</body>
</html>
